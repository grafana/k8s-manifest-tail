suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: k8s-manifest-tail

  - it: should not create a ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use a custom name when set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should include annotations when set
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::role/my-role

  - it: should not include annotations by default
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should include correct labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: k8s-manifest-tail

  - it: should set the release namespace
    release:
      namespace: monitoring
    asserts:
      - equal:
          path: metadata.namespace
          value: monitoring
