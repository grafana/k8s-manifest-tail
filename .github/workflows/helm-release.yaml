---
name: Release Helm chart
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:

permissions: {}

jobs:
  release-chart:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@hackathon-17-verify-all-the-charts
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      charts_dir: operations
      cr_configfile: cr.yaml
      ct_configfile: ct.yaml
      github_app: k8s-manifest-tail

  release:
    runs-on: ubuntu-latest
    needs: release-chart
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Parse Chart.yaml
        id: parse-chart
        working-directory: operations/helm
        run: |
          name=$(yq ".name" < Chart.yaml)
          version=$(yq ".version" < Chart.yaml)
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          {
            echo "tagname=${name}-${version}";
            echo "prerelease=${prerelease}";
          } >> "${GITHUB_OUTPUT}"

      - name: Make GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAGNAME: ${{ steps.parse-chart.outputs.tagname }}
          PRERELEASE: ${{ steps.parse-chart.outputs.prerelease }}
        run: |
          prerelease_flag=""
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${TAGNAME}" \
            --title "${TAGNAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes "Chart released at https://github.com/grafana/helm-charts/releases/tag/${TAGNAME}" \
            ${prerelease_flag}
